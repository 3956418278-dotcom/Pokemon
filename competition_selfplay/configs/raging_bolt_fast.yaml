  win_rate_threshold: 0.58
  evaluation_games: 256
  minimum_games: 128
  draws_as_half_win: true
  alternate_seats: true
  max_promotions: 12
  max_evaluations_without_promotion: 6

training:
  seed: 20260719
  device: cuda
  train_steps_per_iteration: 65536
  rollout_episodes: 512
  learning_rate: 0.00025
  gamma: 0.995
  gae_lambda: 0.95
  update_epochs: 4
  minibatch_size: 256
  clip_epsilon: 0.15
  value_clip_epsilon: 0.20
  entropy_coefficient: 0.015
