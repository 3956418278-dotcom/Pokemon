seed: 20260710

data:
  cache_dir: artifacts/card_data
  validation_ratio: 0.15
  split_mode: card_id

model:
  embedding_dim: 128
  detail_token_dim: 128
  detail_pooling: attention
  text_encoder_name: hashing
  freeze_text_encoder: false

training:
  batch_size: 64
  relation_batch_size: 96
  attack_relation_batch_size: 96
  max_epochs: 400
  min_epochs: 80
  eval_every_epochs: 5
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  checkpoint_dir: checkpoints
  log_dir: logs
  device: cpu
  early_stopping:
    enabled: true
    patience: 40
    restore_best_checkpoint: true
  masking:
    categorical_probability: 0.10
    numeric_probability: 0.10
    text_token_dropout: 0.10
    detail_field_probability: 0.10

tasks:
  mask_probability: 0.15
  temperature: 0.07
  energy_separation_margin: 0.25

loss_weights:
  mask: 1.0
  contrastive: 1.0
  relation: 1.0
  detail: 1.0
  energy: 0.0
